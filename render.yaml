services:
  # Backend API Service
  - type: web
    name: talk-to-krishna-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m src.create_embeddings && gunicorn website.api_server:app --workers 1 --threads 4 --timeout 180 --preload"
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        # Remove trailing slash. Ex. https://example.vercel.app
        sync: false
      - key: DB_PATH
        value: /data/users.db
      - key: HF_HOME
        value: /data/hf_cache
      - key: HUGGINGFACE_HUB_CACHE
        value: /data/hf_cache
      - key: HF_TOKEN
        sync: false
      - key: EMBEDDINGS_FILE
        value: /data/gita_embeddings.pkl
